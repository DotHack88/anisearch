version: "3.9"

services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      - REDIS_URL=redis://redis:6379
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8080}
      - UVICORN_WORKERS=${UVICORN_WORKERS:-2}
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # Persiste il database SQLite fuori dal container
      - anisearch_db:/app/backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  anisearch_db:
